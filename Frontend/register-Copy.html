<div class="form-card">
    <h1 class="page-title">Register Page</h1>
    <form id="registerForm">
        <div class="input-row">
  <label>Full Name :</label>
  <input type="text" name="name" required>
</div>

<div class="input-row">
  <label>Email :</label>
  <input type="email" name="email" required>
</div>

<div class="input-row">
  <label>Phone :</label>
  <input type="text" id="phone" name="phone" required>
</div>

<div class="input-row">
  <label>Password :</label>
  <input type="password" name="password" required>
</div>
        <button class="btn-submit">Register Now</button>
    </form>

    <div class="footer-text">
    Already have account? <a href="login.html">Go To Login Page</a><br>
    <a href="index.html">BACK TO HOME</a>
</div>


</div>
<script src="script.js"></script>

<!-- Alert Boxes -->
<div class="overlay" id="customAlert">
  <div class="alert-box">
    <div class="header">Smart Lost & Found Portal</div>
    <div class="message" id="alertMessage">Message Here</div>
    <button class="ok-btn" onclick="closeAlert()">OK</button>
  </div>
</div>
