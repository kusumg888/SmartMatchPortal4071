<h2 style="text-align:center; font-size: 3rem; margin-top:30px; margin-bottom:-10px; line-height:1;">
    Report a Lost Item
</h2>
<div class="form-card">
    <form action="http://localhost:5000/lost-item" method="POST" enctype="multipart/form-data">


<div class="input-row">
<label>Item Name:</label>
<input type="text" name="itemname" required>
</div>

<div class="input-row">
<label>Category:</label>
<input type="text" name="category" placeholder="(Mobile, Bag, ID Card, etc)" required>
</div>

<div class="input-row">
<label>Description:</label>
<textarea name="description" rows="2"></textarea>
</div>

<div class="input-row">
<label>Location:</label>
<input type="text" name="location">
</div>

<div class="input-row">
<label>Date:</label>
<input type="date" name="lostdate" required>
</div>

<div class="input-row">
<label>Upload Image:</label>
<input type="file" name="image" style="background:white; border-radius:5px;">
</div>

<button type="submit" class="btn-submit">Submit</button>

</form>
</div>
